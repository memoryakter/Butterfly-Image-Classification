<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly Species Classifier</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
          min-height:100vh;
          background:linear-gradient(135deg,#667eea,#764ba2);
          display:flex;
         justify-content:center;
         align-items:flex-start;
         padding:40px 20px;
         overflow-y:auto;
        }

        body::before{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:#ffffff20;
            border-radius:50%;
            top:-150px;
            left:-150px;
        }

        body::after{
            content:'';
            position:absolute;
            width:450px;
            height:450px;
            background:#ffffff15;
            border-radius:50%;
            bottom:-150px;
            right:-120px;
        }

        .container{
            position:relative;
            width:480px;
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.25);
            border-radius:25px;
            padding:40px;
            text-align:center;
            color:white;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
            z-index:10;
        }

        h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .subtitle{
            font-size:15px;
            opacity:.9;
            margin-bottom:30px;
            line-height:1.6;
        }

        .upload-box{
            border:2px dashed rgba(255,255,255,.5);
            border-radius:15px;
            padding:25px;
            transition:.3s;
            cursor:pointer;
        }

        .upload-box:hover{
            background:rgba(255,255,255,.08);
        }

        input[type=file]{
            display:block;
            margin:auto;
            color:white;
        }

        input[type=file]::file-selector-button{
            background:white;
            color:#5b4bc4;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:600;
        }

        #preview{
            margin-top:25px;
            width:250px;
            display:none;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.35);
        }

        button{
            width:100%;
            margin-top:30px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:white;
            color:#5b4bc4;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-2px);
            background:#f3f3f3;
        }

        .loading{
            display:none;
            margin-top:18px;
            color:white;
            font-size:15px;
        }

        .spinner{
            width:25px;
            height:25px;
            border:4px solid rgba(255,255,255,.3);
            border-top:4px solid white;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:0 auto 10px;
        }

        @keyframes spin{
            100%{
                transform:rotate(360deg);
            }
        }

        .result{
            margin-top:25px;
            background:white;
            color:#333;
            padding:18px;
            border-radius:12px;
            font-weight:600;
            font-size:18px;
            animation:fade .5s;
        }

        @keyframes fade{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        footer{
            margin-top:30px;
            font-size:13px;
            opacity:.85;
        }

        @media(max-width:550px){

            .container{
                width:90%;
                padding:25px;
            }

            #preview{
                width:200px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <h1>🦋 Butterfly Image Classifier 🦋</h1>

    <p class="subtitle">
        Upload a butterfly image and identify its species using an
        EfficientNetB0 deep learning model.
    </p>

    <form action="/predict"
          method="POST"
          enctype="multipart/form-data"
          onsubmit="showLoading()">

        <div class="upload-box">

            <input type="file"
                   name="image"
                   accept="image/*"
                   onchange="previewImage(event)"
                   required>

            <img id="preview">

        </div>

        <button type="submit">
            🔍 Predict Species
        </button>

        <div class="loading" id="loading">

            <div class="spinner"></div>

            Predicting... Please wait

        </div>

    </form>

    {% if predicted_text %}
    <div class="result">
        {{ predicted_text }}
    </div>
    {% endif %}

    <footer>
        TensorFlow • Flask • EfficientNetB0
    </footer>

</div>

<script>

function previewImage(event){

    const preview=document.getElementById("preview");

    preview.src=URL.createObjectURL(event.target.files[0]);

    preview.style.display="block";

}

function showLoading(){

    document.getElementById("loading").style.display="block";

}

</script>

</body>

</html>
